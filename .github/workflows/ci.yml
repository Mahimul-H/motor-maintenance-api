name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: python3 src/train_model.py
      - run: ls -la
      - run: ls -la models/
      - run: PYTHONPATH=$PWD python3 -m pytest tests/